openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prayers
    description: Prayer operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /prayers/generate:
    post:
      operationId: generatePrayer
      tags: [prayers]
      summary: Generate a prayer using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePrayerRequest"
      responses:
        "200":
          description: Generated prayer text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPrayer"
        "402":
          description: Free tier monthly limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeTierLimitReached"

  /prayers/browse:
    get:
      operationId: getBrowsePrayers
      tags: [prayers]
      summary: Get community prayers
      parameters:
        - name: tradition
          in: query
          required: false
          schema:
            type: string
            default: All
      responses:
        "200":
          description: List of community prayers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPrayerList"
    post:
      operationId: submitCommunityPrayer
      tags: [prayers]
      summary: Submit a prayer to the community collection
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCommunityPrayerRequest"
      responses:
        "201":
          description: Prayer submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPrayer"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /prayers/usage:
    get:
      operationId: getPrayerUsage
      tags: [prayers]
      summary: Get the current user's prayer generation usage for this month
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        "200":
          description: Monthly usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerUsage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GeneratePrayerRequest:
      type: object
      properties:
        tradition:
          type: string
        intentions:
          type: array
          items:
            type: string
        tone:
          type: string
        context:
          type: string
      required:
        - tradition
        - intentions
        - tone

    GeneratedPrayer:
      type: object
      properties:
        prayer:
          type: string
      required:
        - prayer

    FreeTierLimitReached:
      type: object
      properties:
        error:
          type: string
        count:
          type: integer
        limit:
          type: integer
      required:
        - error
        - count
        - limit

    PrayerUsage:
      type: object
      properties:
        count:
          type: integer
        limit:
          type: integer
        month:
          type: string
        isPremium:
          type: boolean
      required:
        - count
        - limit
        - month
        - isPremium

    CommunityPrayer:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        tradition:
          type: string
        intention:
          type: string
        text:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - tradition
        - intention
        - text
        - createdAt

    CommunityPrayerList:
      type: object
      properties:
        prayers:
          type: array
          items:
            $ref: "#/components/schemas/CommunityPrayer"
      required:
        - prayers

    SubmitCommunityPrayerRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        tradition:
          type: string
          minLength: 1
        intention:
          type: string
          minLength: 1
        text:
          type: string
          minLength: 1
      required:
        - title
        - tradition
        - intention
        - text

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
